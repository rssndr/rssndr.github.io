<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Loading…</title>
    <link rel="stylesheet" href="style.css" />

    <!-- Marked -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- DOMPurify (sanitization) -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>

    <!-- GoatCounter (custom domain) -->
    <script data-goatcounter="https://stats.andrearossetti.me/count"
    async src="//stats.andrearossetti.me/count.js"></script>
  </head>

  <body>
    <main>
      <div class="page-header">
        <a href="/" class="back">← back</a>
      </div>

      <article id="content" class="prose prose-loading">
        loading...
      </article>
    </main>

    <script>
const params = new URLSearchParams(window.location.search);
const src = params.get("src");
const contentEl = document.getElementById("content");

// safer marked config
marked.setOptions({
mangle: false,
headerIds: false
});

if (!src) {
showError("No source provided.");
} else {
fetch(src)
.then(res => {
if (!res.ok) throw new Error("Failed to load markdown");
return res.text();
})
.then(md => {
// --- Extract title + subtitle ---
// convention:
// # Title
// Subtitle line (optional)
const lines = md.split("\n");

let title = null;
let subtitle = null;

if (lines[0].startsWith("# ")) {
title = lines[0].replace(/^# /, "").trim();

// second line as subtitle if it's plain text
if (lines[1] && lines[1].trim() !== "" && !lines[1].startsWith("#")) {
subtitle = lines[1].trim();
}
}

// set document title
if (title && subtitle) {
document.title = `${title} — ${subtitle}`;
} else if (title) {
document.title = title;
} else {
document.title = "Page";
}

// --- Render markdown ---
const rawHtml = marked.parse(md);

// --- Sanitize ---
const cleanHtml = DOMPurify.sanitize(rawHtml);

contentEl.innerHTML = cleanHtml;
contentEl.classList.remove("prose-loading");

// --- Render LaTeX ---
renderMathInElement(contentEl, {
delimiters: [
{left: "$$", right: "$$", display: true},
{left: "$", right: "$", display: false}
]
});

// --- GoatCounter tracking (per page) ---
if (window.goatcounter && src) {
goatcounter.count({
path: "/" + src,
title: document.title
});
}
})
.catch(err => {
console.error(err);
showError("Error loading page.");
});
}

function showError(msg) {
contentEl.className = "prose prose-error";
contentEl.textContent = msg;
}
    </script>

  </body>
</html>
