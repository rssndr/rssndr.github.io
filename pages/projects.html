<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Writing - Andrea Rossetti</title>
        <link rel="stylesheet" href="../style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
        <link rel="icon" type="image/x-icon" href="../favicon/favicon.ico">
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> <!-- Not needed for fetching, but if you want to parse MD structure -->
    </head>
    <body>
        <nav id="sidebar-placeholder" class="sidebar"></nav>
        <button id="theme-toggle" class="theme-toggle"><i class="fas fa-moon"></i></button>
        <main>
            <div class="main-content">
                <h1>Projects</h1>
                <p>Check out my projects!</p>

                <ul class="item-list" id="posts-list">
                    <!-- JS generates list -->
                </ul>
            </div>

            <footer class="site-footer">
                <p>Built with HTML, CSS & JS</p>
                <p>© 2025 Andrea Rossetti</p>
            </footer>
       </main>

        <button id="back-to-top">↑</button>

        <script src="../js/theme-toggle.js"></script>
        <script src="../js/back-to-top.js"></script>
        <script src="../js/sidebar.js"></script>

        <script>
        const postIds = ['micrograd-c', 'tcp-server', 'vps']; // to be updated
        let currentPage = window.location.pathname; // Track current page

        const listContainer = document.getElementById('posts-list');

        postIds.forEach(id => {
            fetch(`../projects/${id}.md`)
                .then(response => response.text())
                .then(md => {
                    const titleMatch = md.match(/^# (.*)/);
                    const title = titleMatch ? titleMatch[1].trim() : 'Untitled';
                    const subtitleMatch = md.match(/\n\n(.*?)\n/);
                    const subtitle = subtitleMatch ? subtitleMatch[1].trim() : 'No description available';
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <a href="/projects/${id}" onclick="redirectToCleanUrl(event, '/projects/${id}')">
                            <span class="item-title">${title}</span>
                            <span class="item-subtitle">${subtitle}</span>
                            <span class="item-arrow">→</span>
                        </a>
                    `;
                    listContainer.appendChild(li);
                })
                .catch(error => console.error(`Error loading ${id}.md:`, error));
        });

        function redirectToCleanUrl(event, cleanUrl) {
            event.preventDefault();
            currentPage = cleanUrl; // Update current page
            window.location.href = cleanUrl; // Navigate
        }

        // Detect back navigation by comparing current and previous page
        window.addEventListener('unload', () => {
            // Store current page in sessionStorage before leaving
            sessionStorage.setItem('previousPage', currentPage);
        });

        window.addEventListener('load', () => {
            const previousPage = sessionStorage.getItem('previousPage');
            console.log('load triggered, previousPage:', previousPage, 'currentPage:', window.location.pathname);
            if (previousPage && previousPage.startsWith('/projects/') && window.location.pathname === '/pages/projects.html') {
                console.log('Detected back to projects.html, reloading');
                window.location.reload();
            }
            // Reset for next navigation
            sessionStorage.removeItem('previousPage');
        });
        </script>

        <script data-goatcounter="https://andrearossetti.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    </body>
</html>
