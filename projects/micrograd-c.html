<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Loading... - Andrea Rossetti</title>
        <link rel="stylesheet" href="../style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
        <link rel="icon" type="image/x-icon" href="../favicon/favicon.ico">
        <script data-goatcounter="https://andrearossetti.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
        <!-- Configure MathJax to use $ as delimiters -->
        <script>
            window.MathJax = {
                tex: {
                    inlineMath: [['$', '$'], ['\\(', '\\)']]
                }
            };
        </script>
        <!-- Load MathJax 3 -->
        <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.1/purify.min.js"></script>
    </head>
    <body>
        <nav id="sidebar-placeholder" class="sidebar"></nav>
        <button id="theme-toggle" class="theme-toggle"><i class="fas fa-moon"></i></button>
        <main>
            <div class="main-content">
                <div class="section body-section" id="post-content">
                    <!-- Markdown rendered here -->
                </div>
            </div>

            <footer class="site-footer">
                <p>Built with HTML, CSS & JS</p>
                <p>© 2025 Andrea Rossetti</p>
            </footer>
        </main>

        <button id="back-to-top">↑</button>

        <script src="../js/sidebar.js"></script>
        <script src="../js/theme-toggle.js"></script>
        <script src="../js/back-to-top.js"></script>

        <script>
            marked.setOptions({
                breaks: true,
                gfm: true,
            });
        </script>

        <script>
            marked.setOptions({
                breaks: true,
                gfm: true,
            });

            let id = new URLSearchParams(window.location.search).get('id');
            if (!id) {
                // Extract id from path if no query string
                const pathParts = window.location.pathname.split('/');
                if (pathParts.length > 2 && pathParts[1] === 'projects') {
                    id = pathParts[2];
                }
            }
            if (id) {
                fetch(`/projects/${id}.md`)
                    .then(response => response.text())
                    .then(md => {
                        const titleMatch = md.match(/^# (.*)/);
                        const title = titleMatch ? titleMatch[1].trim() : 'Untitled';
                        const html = DOMPurify.sanitize(marked.parse(md), {
                            ALLOWED_TAGS: [
                                'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'p', 'em', 'strong',
                                'ul', 'ol', 'li', 'span', 'div', 'br', 'code', 'pre', 'a'
                            ],
                            ALLOWED_ATTR: ['href', 'target', 'rel'],
                        });

                        const postContent = document.getElementById('post-content');
                        postContent.innerHTML = html;

                        const links = postContent.getElementsByTagName('a');
                        for (let link of links) {
                            link.setAttribute('target', '_blank');
                            link.setAttribute('rel', 'noopener noreferrer');
                        }

                        // Wait for MathJax to load, then typeset
                        function typesetMath() {
                            if (typeof MathJax !== 'undefined') {
                                MathJax.typesetPromise();
                            } else {
                                setTimeout(typesetMath, 500);
                            }
                        }
                        typesetMath();

                        if (window.goatcounter) {
                            window.goatcounter.count({
                                path: `/projects/${id}`,
                                title: title,
                                event: true
                            });
                        }
                    })
                    .catch(error => console.error('Error loading Markdown:', error));
            } else {
                document.getElementById('post-content').innerHTML = '<p>Error: No post ID provided.</p>';
            }
        </script>
    </body>
</html>
