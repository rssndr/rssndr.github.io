<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Project - Andrea Rossetti</title>  <!-- Change project title here -->

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../favicon/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@4.0.0/lib/index.umd.js"></script>
</head>
<body>
    <nav id="sidebar-placeholder" class="sidebar"></nav>
    <button id="theme-toggle" class="theme-toggle"><i class="fas fa-moon"></i></button>

    <main>
        <div class="main-content">
            <div class="section body-section" id="post-content">
                <!-- Markdown content will appear here -->
            </div>
        </div>

        <footer class="site-footer">
            <p>Built with HTML, CSS & JS</p>
            <p>© 2025 Andrea Rossetti</p>
        </footer>
    </main>

    <button id="back-to-top">↑</button>

    <script src="../js/sidebar.js"></script>
    <script src="../js/theme-toggle.js"></script>
    <script src="../js/back-to-top.js"></script>

    <script>
        // Configure marked to use the KaTeX extension
        const { marked } = window.marked;
        const { markedKatex } = window.markedKatexExtension;

        marked.use(markedKatex({
          throwOnError: false,
        }));

        // ================== CHANGE THIS LINE ONLY ==================
        const markdownFile = "project.md";   // ←←← Put your .md filename here
        // ===========================================================

        fetch(markdownFile)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Could not load ${markdownFile}`);
                }
                return response.text();
            })
            .then(md => {
                // Extract title from the first # heading
                const titleMatch = md.match(/^# (.*)/m);
                const title = titleMatch ? titleMatch[1].trim() : 'Untitled Post';

                // Set page title
                document.title = `${title} - Andrea Rossetti`;

                // Render the markdown with KaTeX support
                document.getElementById('post-content').innerHTML = marked.parse(md);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('post-content').innerHTML = `
                    <h2>Error</h2>
                    <p>Could not load the markdown file: <strong>${markdownFile}</strong></p>
                    <p style="color: red;">${error.message}</p>
                `;
            });
    </script>
</body>
</html>
