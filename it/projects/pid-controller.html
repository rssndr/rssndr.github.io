<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../favicon/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@1.0.2/lib/index.umd.js"></script>
    <script>
        marked.use(markedKatex({
            throwOnError: false
        }));
    </script>
    <script data-goatcounter="https://andrearossetti.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>

<body>
    <nav id="sidebar-placeholder" class="sidebar"></nav>
    <div class="settings-container">
        <button id="settings-toggle" class="settings-toggle">
            <i class="fas fa-gear"></i>
        </button>

        <div class="dropdown-menu" id="dropdown-menu">
            <button class="menu-item" id="theme-toggle" title="Toggle Theme">
                <i class="fas fa-moon" id="theme-icon"></i>
            </button>

            <button class="menu-item" id="lang-toggle" title="Cambia Lingua">
                <i class="fa-solid fa-language"></i>
            </button>
        </div>
    </div>
    <main>
        <div class="main-content">
            <div class="section body-section" id="post-content">
                <!-- Markdown content will appear here -->
            </div>
        </div>

        <footer class="site-footer">
            <p>Built with HTML, CSS & JS</p>
            <p>© 2025 Andrea Rossetti</p>
        </footer>
    </main>

    <button id="back-to-top">↑</button>

    <script src="../js/sidebar.js"></script>
    <script src="../js/theme-toggle.js"></script>
    <script src="../js/back-to-top.js"></script>

    <script>
        // ================== CHANGE THIS LINE ONLY ==================
        const markdownFile = "pid-controller.md";
        // ===========================================================

        fetch(markdownFile)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Could not load ${markdownFile}`);
                }
                return response.text();
            })
            .then(md => {
                // Extract title from first H1
                const titleMatch = md.match(/^# (.*)/m);
                const title = titleMatch ? titleMatch[1].trim() : 'Untitled Post';

                document.title = `${title} - Andrea Rossetti`;

                // Render markdown with KaTeX support
                document.getElementById('post-content').innerHTML = marked.parse(md);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('post-content').innerHTML = `
                    <h2>Error</h2>
                    <p>Could not load the markdown file: <strong>${markdownFile}</strong></p>
                    <p style="color: red;">${error.message}</p>
                `;
            });
    </script>
</body>
</html>
